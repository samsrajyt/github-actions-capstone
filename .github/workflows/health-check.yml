on:
  permissions:
    contents: read
  workflow_dispatch:

  schedule:
    - cron: '0 */12 * * *'

jobs:
  health-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v6

      - name: Docker login
        uses: docker/login-action@v4
        with:
          username: ${{ vars.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Pull the image
        run: |
          docker pull ${{ vars.DOCKER_USERNAME }}/flask-app:latest

      - name: Run the image in detached mode
        run: |
          docker run -d --name flask-app -p 80:80 ${{ vars.DOCKER_USERNAME }}/flask-app:latest

      - name: Sleep
        run: |
          sleep 5 
          pip install -r requirements.txt
          chmod +x test_app.py
          python test_app.py

      - name: Check for Success
        if: ${{ success() }}
        run: |
          echo "Status=passed"
          echo "## Health Check Report" >> $GITHUB_STEP_SUMMARY
          echo "- Image: ${{vars.DOCKER_USERNAME }}/flask-app:latest" >> $GITHUB_STEP_SUMMARY
          echo "- Status: PASSED" >> $GITHUB_STEP_SUMMARY
          echo "- Time: $(date)" >> $GITHUB_STEP_SUMMARY

      - name: Run on failure
        if: ${{ failure()}}
        run: |
          echo "Status=failed"
          echo "Failed to generate health check report"
          
      - name: Stop and remove container
        if: always()
        run: |
          docker stop flask-app
          docker rm flask-app
          


          